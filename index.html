<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML预览</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{max-width:700px;margin:40px auto;padding:0 16px;font-family:sans-serif}
textarea{width:100%;height:300px;padding:12px;border:1px solid #ddd;border-radius:8px}
button{margin-top:12px;padding:12px;background:#0070f3;color:#fff;border:none;border-radius:8px;width:100%}
#result{margin-top:20px;padding:12px;background:#f5f5f5;border-radius:8px;word-break:break-all}
</style>
</head>
<body>
<h2>HTML在线预览</h2>
<textarea id="code" placeholder="粘贴HTML"></textarea>
<button onclick="create()">生成链接</button>
<div id="result"></div>

<script>
async function create(){
  const res = await fetch("/api/preview", {
    method: "POST",
    body: document.getElementById("code").value
  })
  const data = await res.json()
  document.getElementById("result").innerHTML = 
    `<a href="${data.url}" target="_blank">${data.url}</a>`
}
</script>
</body>
</html>
